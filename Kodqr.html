<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>

<style>
:root{
  --bg:#000;
  --panel:rgba(255,255,255,0.04);
  --text:#fff;
  --muted:rgba(255,255,255,0.6);
  --primary:#7c6cff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

.wrapper{
  display:flex;
  min-height:100vh;
}

/* PANEL */
.panel{
  width:420px;
  max-width:100%;
  padding:24px;
  background:var(--panel);
  border-right:1px solid rgba(255,255,255,0.08);
  overflow-y:auto;
  height:100vh;
}

/* BACK BUTTON */
.back{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:42px;
  height:42px;
  border-radius:12px;
  background:#111;
  border:1px solid rgba(255,255,255,0.1);
  color:#fff;
  text-decoration:none;
  font-size:18px;
  margin-bottom:12px;
  transition:.2s;
}

.back:hover{
  transform:translateX(-3px);
  background:#1a1a1a;
}

/* PREVIEW */
.preview{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:2rem;
  overflow:hidden;
}

.qr-box{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
}

/* TITLES */
.section-title{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--muted);
  margin:16px 0 6px;
}

/* INPUTS */
input, select{
  width:100%;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:#111;
  color:#fff;
  margin-bottom:10px;
  outline:none;
}

/* COLOR */
.color-wrap{
  position:relative;
  width:100%;
  height:42px;
  border-radius:14px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.15);
  margin-top:1rem;
}

.color-preview{
  width:100%;
  height:100%;
}

.color-wrap input{
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
}

.row{
  display:flex;
  gap:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  cursor:pointer;
}

/* DROPZONE */
.dropzone{
  border:1px dashed rgba(255,255,255,0.3);
  border-radius:12px;
  padding:14px;
  text-align:center;
  cursor:pointer;
  background:#0f0f0f;
  margin-bottom:10px;
}

.dropzone.drag{
  background:rgba(124,108,255,0.1);
  border-color:var(--primary);
}

/* QR */
#qr{
  background:#fff;
  padding:16px;
  border-radius:16px;
  max-width:90vw;
  max-height:90vw;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* RESPONSIVE */
@media (max-width: 900px){
  .wrapper{flex-direction:column;}

  .panel{
    width:100%;
    height:auto;
    max-height:55vh;
    border-right:none;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }

  .preview{
    min-height:45vh;
    padding:1.5rem;
  }

  #qr{transform:scale(0.72);}
}

@media (max-width: 500px){
  .panel{padding:16px; max-height:60vh;}
  .preview{padding:1rem;}
  #qr{transform:scale(0.82);}
  input, select{font-size:14px;}
}
body {
  opacity: 0;
  transition: opacity 0.5s ease;
}

body.loaded {
  opacity: 1;
}

body.fade-out {
  opacity: 0;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="panel">

<a href="index.html" class="back">←</a>

<h2>QR Generator</h2>

<div class="section-title">Typ QR</div>
<select id="type">
  <option value="url">Link</option>
  <option value="text">Tekst</option>
  <option value="email">Email</option>
  <option value="phone">Telefon</option>
  <option value="sms">SMS</option>
  <option value="wifi">Wi-Fi</option>
</select>

<div id="extra"></div>

<div id="textWrap">
  <div class="section-title">Treść</div>
  <input id="text" placeholder="https://twojastrona.pl">
</div>

<div class="section-title">Kształt kropek</div>
<select id="dots">
  <option value="square">Kwadratowe</option>
  <option value="dots">Kropki</option>
  <option value="rounded">Zaokrąglone</option>
  <option value="extra-rounded">Bardzo zaokrąglone</option>
  <option value="classy">Eleganckie</option>
  <option value="classy-rounded">Elegancko zaokrąglone</option>
</select>

<div class="section-title">Rogi</div>
<select id="corners">
  <option value="square">Kwadrat</option>
  <option value="dot">Kropka</option>
  <option value="extra-rounded">Bardzo zaokrąglone</option>
</select>

<div class="section-title">Rogi (punkt)</div>
<select id="cornersDot">
  <option value="square">Kwadrat</option>
  <option value="dot">Kropka</option>
</select>

<div class="section-title">Gradient</div>
<select id="gradient">
  <option value="none">Brak</option>
  <option value="horizontal">Poziomy</option>
  <option value="vertical">Pionowy</option>
  <option value="radial">Promienisty</option>
</select>

<div class="section-title">Kolory</div>

<div class="row">
  <div class="color-wrap">
    <div class="color-preview" id="preview1"></div>
    <input type="color" id="color" value="#000000">
  </div>

  <div class="color-wrap">
    <div class="color-preview" id="preview2"></div>
    <input type="color" id="color2" value="#5555ff">
  </div>
</div>

<div class="color-wrap">
  <div class="color-preview" id="previewBg"></div>
  <input type="color" id="bg" value="#ffffff">
</div>

<div class="section-title">Logo PNG</div>

<div class="dropzone" id="dropzone">
  Kliknij lub przeciągnij PNG
  <input type="file" id="logo" accept="image/png" hidden>
</div>

<div class="section-title">Rozmiar logotypu</div>
<input type="range" id="logoSize" min="0.1" max="0.5" step="0.05" value="0.2">

<div class="section-title">Rozmiar</div>
<input type="range" id="size" min="200" max="700" value="320">

<button class="btn" onclick="startFlow()">Pobierz PNG</button>

</div>

<div class="preview">
  <div class="qr-box">
    <div id="qr"></div>
  </div>
</div>

</div>


<div class="dl-overlay" id="dlPopup">
  <div class="dl-modal">

    <div class="dl-header">
      <div class="dl-icon">⬇</div>
      <div>
        <h3>Pobieranie pliku</h3>
        <p id="dlStage">Start...</p>
      </div>
    </div>

    <div class="dl-bar-wrap">
      <div class="dl-bar" id="dlBar"></div>
    </div>

    <div class="dl-percent" id="dlPercent">0%</div>

    <button class="dl-cancel" onclick="cancelDownload()">
      Anuluj pobieranie
    </button>

  </div>
</div>

<style>.dl-overlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(0,0,0,0.65);
  backdrop-filter: blur(1.2rem);

  opacity:0;
  pointer-events:none;
  transition:.25s;
  z-index:9999;
}

.dl-overlay.active{
  opacity:1;
  pointer-events:all;
}

.dl-modal{
  width:min(26rem, 92%);
  padding:1.6rem;
  border-radius:1.4rem;

  background:rgba(20,20,20,0.85);
  border:1px solid rgba(255,255,255,0.08);
  color:#fff;
}

.dl-header{
  display:flex;
  gap:1rem;
  align-items:center;
  margin-bottom:1.2rem;
}

.dl-icon{
  width:2.8rem;
  height:2.8rem;
  border-radius:0.9rem;

  display:grid;
  place-items:center;

  background:rgba(124,108,255,0.15);
  border:1px solid rgba(124,108,255,0.35);

  font-size:1.3rem;
}

.dl-header h3{
  margin:0;
  font-size:1.05rem;
}

.dl-header p{
  margin:0;
  font-size:0.8rem;
  color:rgba(255,255,255,0.6);
}

.dl-bar-wrap{
  width:100%;
  height:0.7rem;
  background:rgba(255,255,255,0.08);
  border-radius:999rem;
  overflow:hidden;
}

.dl-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#7c6cff,#a18bff);
  border-radius:999rem;
  transition:width .15s ease;
}

.dl-percent{
  margin-top:0.8rem;
  font-size:0.9rem;
  color:rgba(255,255,255,0.7);
}

.dl-cancel{
  margin-top:1.2rem;
  width:100%;
  padding:0.85rem;

  border-radius:0.9rem;
  border:1px solid rgba(255,255,255,0.1);

  background:rgba(255,255,255,0.05);
  color:#fff;

  cursor:pointer;
  transition:.2s;
}

.dl-cancel:hover{
  background:rgba(255,255,255,0.08);
}</style>

<script>
let progress = 0;
let timer = null;
let cancelled = false;

function download(){
  startFlow();
}

function startFlow(){
  progress = 0;
  cancelled = false;

  document.getElementById("dlPopup").classList.add("active");

  timer = setInterval(() => {
    if(cancelled) return;

    // FAZY PROGRESSU
    if(progress < 20){
      progress += Math.random()*3;
      setStage("Startowanie...");
    }
    else if(progress < 60){
      progress += Math.random()*2.5;
      setStage("Przetwarzanie pliku...");
    }
    else if(progress < 90){
      progress += Math.random()*1.5;
      setStage("Finalizacja...");
    }
    else{
      progress += Math.random()*0.8;
      setStage("Dopracowywanie jakości...");
    }

    if(progress >= 100){
      progress = 100;
      update();
      clearInterval(timer);
      setTimeout(realDownload, 250);
      return;
    }

    update();
  }, 80);
}

function update(){
  document.getElementById("dlBar").style.width = progress + "%";
  document.getElementById("dlPercent").innerText = Math.floor(progress) + "%";
}

function setStage(text){
  document.getElementById("dlStage").innerText = text;
}

function cancelDownload(){
  cancelled = true;
  clearInterval(timer);
  document.getElementById("dlPopup").classList.remove("active");
}

function realDownload(){

  document.getElementById("dlPopup")
    .classList.remove("active");

  qr.download({
    name:"qr-code",
    extension:"png"
  });

}
</script>

<script>

const colorInput=document.getElementById("color");
const color2Input=document.getElementById("color2");
const bgInput=document.getElementById("bg");
const fileInput=document.getElementById("logo");

function updateColorUI(){
  preview1.style.background=colorInput.value;
  preview2.style.background=color2Input.value;
  previewBg.style.background=bgInput.value;
}

document.addEventListener("input",()=>{
  updateColorUI();
  updateQR();
});

let qr=new QRCodeStyling({
  width:320,
  height:320,
  data:"https://example.com",
  dotsOptions:{color:"#000"},
  backgroundOptions:{color:"#fff"}
});

qr.append(document.getElementById("qr"));

const drop=document.getElementById("dropzone");

drop.onclick=()=>fileInput.click();

drop.ondragover=e=>{
  e.preventDefault();
  drop.classList.add("drag");
};

drop.ondragleave=()=>drop.classList.remove("drag");

drop.ondrop=e=>{
  e.preventDefault();
  drop.classList.remove("drag");
  const dt=new DataTransfer();
  dt.items.add(e.dataTransfer.files[0]);
  fileInput.files=dt.files;
  updateQR();
};

const type=document.getElementById("type");
const textWrap=document.getElementById("textWrap");
const extra=document.getElementById("extra");

type.onchange=render;

function render(){
  let t=type.value;

  textWrap.style.display=(t==="url"||t==="text")?"block":"none";

  extra.innerHTML="";

  if(t==="phone") extra.innerHTML=`<input id="phone" placeholder="123 456 789">`;
  if(t==="email") extra.innerHTML=`<input id="email" placeholder="email@mail.com">`;
  if(t==="sms") extra.innerHTML=`<input id="sms" placeholder="treść wiadomości">`;
  if(t==="wifi") extra.innerHTML=`
    <input id="ssid" placeholder="Nazwa WiFi">
    <input id="pass" placeholder="Hasło">
  `;
}

render();

function updateQR(){

const get=id=>document.getElementById(id)?.value?.trim()||"";

let t=type.value;
let text="";

if(t==="url"){
  let v=get("text");
  if(!v) v="https://example.com";
  if(!v.startsWith("http")) v="https://"+v;
  text=v;
}

if(t==="text") text=get("text")||"Hello";
if(t==="phone") text="tel:"+get("phone");
if(t==="email") text="mailto:"+get("email");
if(t==="sms") text="sms:"+get("sms");
if(t==="wifi") text=`WIFI:T:WPA;S:${get("ssid")};P:${get("pass")};;`;

let grad;
if(gradient.value!=="none"){
grad={
type:gradient.value,
colorStops:[
{offset:0,color:colorInput.value},
{offset:1,color:color2Input.value}
]
};
}

let img="";
if(fileInput.files[0]){
img=URL.createObjectURL(fileInput.files[0]);
}

qr.update({
width:+size.value,
height:+size.value,
data:text,
image:img,
dotsOptions:{
type:dots.value,
color:grad?undefined:colorInput.value,
gradient:grad
},
cornersSquareOptions:{
type:corners.value,
color:colorInput.value
},
cornersDotOptions:{
type:cornersDot.value,
color:colorInput.value
},
backgroundOptions:{
color:bgInput.value
}
});

}

updateColorUI();
updateQR();

function download(){
qr.download({name:"qr",extension:"png"});
}

// === LOGO SIZE SUPPORT ===

// jeśli nie masz jeszcze slidera w HTML, możesz go też dodać ręcznie:
// <input type="range" id="logoSize" min="0.1" max="0.5" step="0.05" value="0.25">

function updateQR(){

  const get=id=>document.getElementById(id)?.value?.trim()||"";

  let t=type.value;
  let text="";

  if(t==="url"){
    let v=get("text");
    if(!v) v="https://example.com";
    if(!v.startsWith("http")) v="https://"+v;
    text=v;
  }

  if(t==="text") text=get("text")||"Hello";
  if(t==="phone") text="tel:"+get("phone");
  if(t==="email") text="mailto:"+get("email");
  if(t==="sms") text="sms:"+get("sms");
  if(t==="wifi") text=`WIFI:T:WPA;S:${get("ssid")};P:${get("pass")};;`;

  let grad;
  if(gradient.value!=="none"){
    grad={
      type:gradient.value,
      colorStops:[
        {offset:0,color:colorInput.value},
        {offset:1,color:color2Input.value}
      ]
    };
  }

  let img="";
  if(fileInput.files[0]){
    img=URL.createObjectURL(fileInput.files[0]);
  }

  // domyślna wartość jeśli slider nie istnieje
  let logoSizeValue = 0.25;
  const logoSlider = document.getElementById("logoSize");
  if(logoSlider) logoSizeValue = +logoSlider.value;

  qr.update({
    width:+size.value,
    height:+size.value,
    data:text,
    image:img,

    // 🔥 KLUCZOWA CZĘŚĆ — rozmiar logo
    imageOptions:{
      crossOrigin:"anonymous",
      margin:4,
      imageSize:logoSizeValue
    },

    dotsOptions:{
      type:dots.value,
      color:grad?undefined:colorInput.value,
      gradient:grad
    },
    cornersSquareOptions:{
      type:corners.value,
      color:colorInput.value
    },
    cornersDotOptions:{
      type:cornersDot.value,
      color:colorInput.value
    },
    backgroundOptions:{
      color:bgInput.value
    }
  });
}
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});

// FADE OUT przy kliknięciu linku
document.querySelectorAll("a[href]").forEach(link => {
  link.addEventListener("click", function(e) {
    const href = this.getAttribute("href");

    // pomijamy anchor (#) i nowe karty
    if (href.startsWith("#") || this.target === "_blank") return;

    e.preventDefault();

    document.body.classList.add("fade-out");

    setTimeout(() => {
      window.location.href = href;
    }, 400);
  });
});
</script>

</body>
</html>
